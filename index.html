<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aether Crew</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/00ddff/0a1428?text=AC">
  <meta name="theme-color" content="#00ddff">
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Aether Crew</h1>
        <p class="tagline">Your AI Flight Crew • Console Edition</p>
      </div>
      <div class="status" id="status">● Online</div>
    </header>

    <div class="flight-card">
      <div id="flight-info">No flight plan loaded</div>
      <div id="current-phase" class="phase">PRE-FLIGHT</div>
    </div>

    <div class="voice-orb-container">
      <div class="voice-orb" id="voiceOrb">
        <div class="orb-glow"></div>
        <span id="orb-status">Hold to Talk</span>
      </div>
    </div>

    <div class="transcript" id="transcript"></div>

    <div class="roles">
      <button class="role-btn active" data-role="atc">ATC</button>
      <button class="role-btn" data-role="ground">Ground</button>
      <button class="role-btn" data-role="cabin">Cabin</button>
      <button class="role-btn" data-role="dispatch">Dispatch</button>
    </div>

    <div class="actions">
      <button id="import-btn">Import SimBrief</button>
      <button id="debrief-btn">End Flight & Debrief</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/phase.js"></script>
  <script src="js/simbrief.js"></script>
</body>
</html>
